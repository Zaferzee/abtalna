<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏆 أبطالنا</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F7FA; --card: #ffffff; --card2: #f0f2f5; --border: #e8e8e8;
  --text: #222222; --text2: #666666; --text3: #aaaaaa;
  --header: linear-gradient(135deg,#FF8F00,#FF6F00);
  --nav-bg: #ffffff; --nav-border: #f0f0f0;
  --input-bg: #f9f9f9; --panel-bg: #FAFAFA;
  --shadow: rgba(0,0,0,.08); --overlay: rgba(0,0,0,.45);
}
.dark {
  --bg: #0A0E1A; --card: #141828; --card2: #1C2235; --border: rgba(255,255,255,.08);
  --text: #F0F4FF; --text2: #8892A4; --text3: #555e70;
  --header: linear-gradient(135deg,#1a1f35,#0d1220);
  --nav-bg: #0e1220; --nav-border: rgba(255,255,255,.07);
  --input-bg: rgba(255,255,255,.05); --panel-bg: #12192a;
  --shadow: rgba(0,0,0,.4); --overlay: rgba(0,0,0,.7);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:'Tajawal',sans-serif;transition:background-color .3s,border-color .3s,color .2s}
html,body{height:100%;overflow:hidden;background:var(--bg);direction:rtl;color:var(--text)}
#app{height:100%;display:flex;flex-direction:column;background:var(--bg)}
#root{flex:1;overflow-y:auto;padding-bottom:72px}
::-webkit-scrollbar{display:none}
input[type=range]{direction:ltr;width:100%;accent-color:#FF8F00}
textarea,input{direction:rtl;font-family:'Tajawal',sans-serif}
button{cursor:pointer;font-family:'Tajawal',sans-serif}

@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes wiggle{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes shimmer{0%{left:-100%}100%{left:100%}}

.panel{position:fixed;inset:0;background:var(--overlay);z-index:400;display:none;align-items:flex-end;backdrop-filter:blur(4px)}
.panel.open{display:flex}
.panel-inner{background:var(--panel-bg);border-radius:26px 26px 0 0;padding:0 18px 40px;width:100%;animation:slideUp .28s ease;max-height:92vh;overflow-y:auto;border-top:1px solid var(--border)}
.modal-overlay{position:fixed;inset:0;background:var(--overlay);z-index:600;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal-box{background:var(--card);border-radius:24px;padding:26px;width:100%;max-width:320px;box-shadow:0 16px 48px var(--shadow);text-align:center;border:2px solid var(--border);animation:slideUp .25s ease}
.tab-btn{padding:9px 13px;font-size:12px;font-weight:800;color:rgba(255,255,255,.55);background:none;border:none;border-bottom:3px solid transparent;white-space:nowrap;flex-shrink:0;transition:color .2s,border-color .2s}
.tab-btn.active{color:#fff;border-bottom-color:#fff}
.dark .tab-btn{color:rgba(255,215,0,.45)}
.dark .tab-btn.active{color:#FFD700;border-bottom-color:#FFD700}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:3px 5px;min-width:46px}
.nav-dot{width:4px;height:4px;border-radius:50%;background:#FF6F00;display:none;margin-top:1px}
.dark .nav-dot{background:#FFD700}
.nav-btn.active .nav-dot{display:block}
.card{background:var(--card);border-radius:22px;padding:16px;margin-bottom:14px;position:relative;overflow:hidden;border:2px solid var(--border)}
.inp{width:100%;background:var(--input-bg);border:2px solid var(--border);border-radius:11px;padding:10px 13px;color:var(--text);font-size:14px;outline:none;margin-bottom:13px;text-align:right}
.inp:focus{border-color:#FFB300}
.section-title{font-weight:900;font-size:14px;color:var(--text2);margin:20px 0 12px;letter-spacing:.5px}
.prog-bar{border-radius:10px;height:9px;overflow:hidden;position:relative}
.prog-fill{height:100%;border-radius:10px;transition:width .6s ease;position:relative;overflow:hidden}
.prog-fill::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:shimmer 2.5s infinite}
.switch{position:relative;width:48px;height:26px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:26px;transition:.3s}
.slider:before{content:'';position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked + .slider{background:#FF8F00}
input:checked + .slider:before{transform:translateX(22px)}
.color-dot{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s;flex-shrink:0}
.color-dot.active{border-color:#fff;box-shadow:0 0 0 2px #FF8F00}
</style>
</head>
<body>
<div id="app" class="">

</div>

// ── HELPERS
const th = (ti) => (isDark ? TH_DARK : TH)[ti ?? 0];

// ── TOAST
function toast(msg,type="success"){
  const C={success:{bg:"#E8F5E9",br:"#43A047",c:"#1B5E20"},error:{bg:"#FFEBEE",br:"#E53935",c:"#B71C1C"},warning:{bg:"#FFF8E1",br:"#FFB300",c:"#E65100"},info:{bg:"#E3F2FD",br:"#1E88E5",c:"#1565C0"}};
  if(isDark) Object.keys(C).forEach(k=>{C[k].bg="rgba(255,255,255,.08)";});
  const s=C[type]||C.success;
  const el=document.createElement("div");
  el.style.cssText=`background:${isDark?"#1C2235":s.bg};border:2px solid ${s.br};color:${isDark?"#fff":s.c};border-radius:14px;padding:11px 16px;font-weight:800;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.2);text-align:center;animation:toastIn .25s ease;margin-bottom:7px`;
  el.textContent=msg;
  $("toastArea").appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

// ── DARK MODE
function toggleDark(){
  isDark=!isDark;
  document.getElementById("app").classList.toggle("dark",isDark);
  $("darkBtn").textContent=isDark?"☀️":"🌙";
  localStorage.setItem("ah_dark",isDark?"1":"0");
  renderPage(curTab);
}
window.toggleDark=toggleDark;

// ── CONFIRM
let _confDanger=false;
function showConfirm(icon,title,body,danger,cb){
  $("cIcon").textContent=icon; $("cTitle").textContent=title; $("cBody").textContent=body;
  _confDanger=danger; confCb=cb;
  $("cOk").style.cssText=`border-radius:13px;padding:12px;font-size:13px;font-weight:900;border:none;background:${danger?"#FFEBEE":"#FFF8E1"};color:${danger?"#B71C1C":"#E65100"}`;
  $("confirmOverlay").classList.add("open");
}
function closeConfirm(){ $("confirmOverlay").classList.remove("open"); }
$("cOk").onclick=()=>{ if(confCb){confCb();closeConfirm();} };

// ── FIREBASE SAVE
async function cloudSave(data){
  try{
    syncing=true; setSt("🔄 جاري الحفظ...");
    const d={...data};
    // compress photos to save Firebase space
    await setDoc(REF, d);
    setSt(`✅ متزامن · ${new Date().toLocaleTimeString("ar")}`);
  }catch(e){ setSt("❌ خطأ في الحفظ"); toast("خطأ في الاتصال بالسحابة","error"); }
  finally{ syncing=false; }
}

function setSt(m){ $("syncSt").textContent=m; }

// ── FIREBASE LISTEN (real-time)
function startListen(){
  unsubscribe = onSnapshot(REF, snap=>{
    if(snap.exists()){
      const d=snap.data();
      S={...INIT,...d, settings:{...INIT.settings,...(d.settings||{})}};
      applySettings();
      renderPage(curTab);
      if(detId) renderDetail(detId);
      setSt(`✅ متزامن · ${new Date().toLocaleTimeString("ar")}`);
    }
    $("loadingScreen").style.display="none";
  }, err=>{
    setSt("❌ خطأ في الاتصال"); $("loadingScreen").style.display="none";
    toast("تعذر الاتصال بقاعدة البيانات","error");
  });
}

async function manualSync(){
  setSt("🔄 جاري التحديث...");
  try{
    const snap=await getDoc(REF);
    if(snap.exists()){
      const d=snap.data();
      S={...INIT,...d,settings:{...INIT.settings,...(d.settings||{})}};
      applySettings(); renderPage(curTab);
      toast("🔄 تم التحديث!","info");
      setSt(`✅ متزامن · ${new Date().toLocaleTimeString("ar")}`);
    }
  }catch(e){ toast("خطأ في الاتصال","error"); }
}
window.manualSync=manualSync;

function applySettings(){
  const s=S.settings||{};
  $("appTitle").textContent=`🏆 ${s.appName||"أبطالنا"}`;
  if(s.darkMode!==undefined && s.darkMode!==isDark){
    isDark=s.darkMode;
    document.getElementById("app").classList.toggle("dark",isDark);
    $("darkBtn").textContent=isDark?"☀️":"🌙";
  }
  if(s.accentColor){
    document.documentElement.style.setProperty("--accent",s.accentColor);
  }
}

// ── APPLY POINTS
function applyPoints(childId,pts,reason){
  S.children=S.children.map(c=>c.id===childId?{...c,points:c.points+pts}:c);
  S.history=[{childId,points:pts,reason,timestamp:Date.now()},...(S.history||[])].slice(0,300);
  cloudSave(S);
  const child=S.children.find(c=>c.id===childId);
  toast(pts>0?`🌟 ${child.name} كسب ${pts} نقطة!`:`📉 ${child.name} خسر ${Math.abs(pts)} نقطة`,pts>0?"success":"error");
  closePanel(); renderPage(curTab); if(detId===childId)renderDetail(childId);
}
window.applyPoints=applyPoints;

// ── TABS
function goTab(tab,tb,nb){
  curTab=tab;
  ["home","lb","hist","rew","set"].forEach(t=>{ $("p-"+t).style.display=t===tab?"block":"none"; });
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".nav-btn span:last-of-type").forEach(b=>b.style.color="var(--text3)");
  if(tb)tb.classList.add("active");
  const n=$("n-"+tab); if(n){ n.classList.add("active"); const lbl=n.querySelector("span:last-of-type"); if(lbl)lbl.style.color=isDark?"#FFD700":"#FF6F00"; }
  renderPage(tab);
  $("root").scrollTop=0;
}
window.goTab=goTab;

function renderPage(t){
  if(t==="home")rHome();else if(t==="lb")rLB();else if(t==="hist")rHist();else if(t==="rew")rRew();else if(t==="set")rSet();
}

window.rdm=(rid,cid)=>{
  const r=S.rewards.find(x=>x.id===rid),c=S.children.find(x=>x.id===cid);
  if(!r||!c)return;
  if(c.points<r.cost){toast("❌ نقاط غير كافية!","error");return;}
  showConfirm(r.icon,`استبدال: ${r.name}`,`خصم ${r.cost} نقطة من ${c.name}`,false,()=>applyPoints(c.id,-r.cost,`🎁 ${r.name}`));
};
window.addRew=()=>{
  const i=$("rI").value||"🎁",n=$("rN").value,c=parseInt($("rC").value)||100;
  if(!n){toast("أدخل اسم الجائزة","error");return;}
  S.rewards=[...(S.rewards||[]),{id:Date.now(),icon:i,name:n,cost:c}];
  cloudSave(S);rRew();toast("🎁 تمت الإضافة!");
};
window.delRew=(id)=>{
  showConfirm("🗑️","حذف الجائزة؟","سيتم الحذف",true,()=>{
    S.rewards=S.rewards.filter(r=>r.id!==id);cloudSave(S);rRew();toast("🗑️ تم","error");
  });
};

    </div>

      <button onclick="rstAll()" style="background:linear-gradient(135deg,#EF5350,#B71C1C);border:none;border-radius:11px;padding:10px 18px;color:#fff;font-size:13px;font-weight:700">🔄 تصفير الآن</button>
    </div>
    <div style="margin-top:12px;background:${isDark?"rgba(255,140,0,.06)":"#FFF3E0"};border:2px solid ${isDark?"rgba(255,140,0,.25)":"#FFCC80"};border-radius:16px;padding:14px;margin-bottom:20px">
      <div style="font-weight:700;font-size:13px;color:${isDark?"#FFB300":"#E65100"};margin-bottom:5px">🗑️ حذف السجل</div>

      <button onclick="clearHistory()" style="background:linear-gradient(135deg,#FF8F00,#E65100);border:none;border-radius:11px;padding:10px 18px;color:#fff;font-size:13px;font-weight:700">🗑️ حذف السجل بالكامل</button>

window.toggleDarkSave=()=>{ toggleDark(); S.settings={...(S.settings||{}),darkMode:isDark}; cloudSave(S); };
window.saveAppName=()=>{
  const n=$("appNameInp").value||"أبطالنا";
  S.settings={...(S.settings||{}),appName:n};
  $("appTitle").textContent=`🏆 ${n}`;
  cloudSave(S); toast("✅ تم حفظ الاسم!");
};
window.setNBT=(t)=>{ newBT=t; rSet(); };
window.addBeh=()=>{
  const i=$("bI").value||"⭐",t=$("bT").value,p=parseInt($("bP").value)||10;
  if(!t){toast("أدخل الوصف","error");return;}
  S.behaviors=[...(S.behaviors||[]),{id:Date.now(),icon:i,text:t,points:newBT==="positive"?Math.abs(p):-Math.abs(p),type:newBT}];
  cloudSave(S);rSet();toast("✅ تمت الإضافة!");
};
window.delBeh=(id)=>{
  showConfirm("🗑️","حذف السلوك؟","سيتم الحذف",true,()=>{
    S.behaviors=S.behaviors.filter(b=>b.id!==id);cloudSave(S);rSet();toast("🗑️ تم","error");
  });
};
window.rstAll=()=>{
  showConfirm("🔄","تصفير جميع النقاط؟","بداية فترة جديدة — السجل يبقى",true,()=>{
    S.children=S.children.map(c=>({...c,points:0}));
    S.history=[{childId:null,points:0,reason:"🔄 تصفير — بداية جديدة",timestamp:Date.now()},...(S.history||[])];
    cloudSave(S);renderPage(curTab);toast("🔄 تم التصفير!","warning");
  });
};
window.clearHistory=()=>{
  showConfirm("🗑️","حذف السجل بالكامل؟","سيتم حذف جميع سجلات النقاط نهائياً — النقاط الحالية تبقى",true,()=>{
    S.history=[];
    cloudSave(S);renderPage(curTab);toast("🗑️ تم حذف السجل!","warning");
  });
};
window.delChild=(id)=>{
  const c=S.children.find(x=>x.id===id);
  showConfirm("🗑️","حذف الطفل؟",`حذف بيانات ${c?.name}`,true,()=>{
    S.children=S.children.filter(x=>x.id!==id);cloudSave(S);rSet();toast("🗑️ تم","error");
  });
};

// ── POINTS PANEL
function openPanel(cid,mode){
  pChild=cid;pMode=mode;pAmt=10;selB=null;
  const c=S.children.find(x=>x.id===cid);
  const t=th(c.ti); const isA=mode==="add";
  const ac=isA?"#2E7D32":"#C62828";
  const bg=isA?isDark?"rgba(0,200,81,.12)":"#E8F5E9":isDark?"rgba(255,68,68,.12)":"#FFEBEE";
  const br=isA?isDark?"rgba(0,200,81,.35)":"#A5D6A7":isDark?"rgba(255,68,68,.35)":"#EF9A9A";

  $("panelHdr").style.cssText=`background:${bg};border:2px solid ${br};border-radius:16px;padding:11px 14px;display:flex;align-items:center;gap:11px`;
  $("panelHdr").innerHTML=`${avDiv(c,44,22)}<div><div style="font-weight:900;font-size:15px;color:${ac}">${isA?"🌟 إضافة نقاط":"📉 خصم نقاط"}</div><div style="font-size:11px;color:var(--text2)">${c.name} · الرصيد: ${c.points} نقطة</div></div>`;

  const fl=(S.behaviors||[]).filter(b=>isA?b.type==="positive":b.type==="negative");
  $("bList").innerHTML=fl.map(b=>`<button class="bsel ${selB===b.id?(isA?"sp":"sn"):""}" id="bs_${b.id}" onclick="selBeh(${b.id},${Math.abs(b.points)},'${b.text.replace(/'/g,"\\'")}')">
    <div style="display:flex;align-items:center;gap:9px"><span style="font-size:20px">${b.icon}</span><span style="font-size:13px;font-weight:700;color:var(--text)">${b.text}</span></div>
    <span style="font-size:13px;font-weight:900;color:${ac};background:${bg};padding:2px 9px;border-radius:18px;border:1px solid ${br}">${isA?"+":""}${b.points}</span>

  $("amtD").style.color=ac; $("amtD").textContent=pAmt;
  $("preRow").innerHTML=[5,10,15,20,25,50].map(n=>`<button class="pre" id="pr_${n}" onclick="setPre(${n})">${n}</button>`).join("");

  cb.style.cssText=`border:none;border-radius:15px;padding:13px;color:#fff;font-size:14px;font-weight:900;background:${isA?"linear-gradient(135deg,#43A047,#1B5E20)":"linear-gradient(135deg,#E53935,#B71C1C)"};box-shadow:0 3px 14px ${isA?"rgba(67,160,71,.35)":"rgba(229,57,53,.35)"}`;
  updBtn(); $("reasonInp").value=""; $("pointsPanel").classList.add("open");
}
window.openPanel=openPanel;

window.selBeh=(id,amt,text)=>{
  selB=id;pAmt=amt;$("amtD").textContent=amt;$("reasonInp").value=text;updBtn();
  document.querySelectorAll(".bsel").forEach(b=>b.classList.remove("sp","sn"));
  const b=$("bs_"+id);if(b)b.classList.add(pMode==="add"?"sp":"sn");
  document.querySelectorAll(".pre").forEach(b=>b.classList.remove("ap","an"));
};
window.setPre=(n)=>{
  pAmt=n;selB=null;$("amtD").textContent=n;
  document.querySelectorAll(".pre").forEach(b=>b.classList.remove("ap","an"));
  const b=$("pr_"+n);if(b)b.classList.add(pMode==="add"?"ap":"an");
  document.querySelectorAll(".bsel").forEach(b=>b.classList.remove("sp","sn"));
  updBtn();
};
window.chgAmt=(d)=>{
  pAmt=Math.max(1,pAmt+d);$("amtD").textContent=pAmt;selB=null;
  document.querySelectorAll(".bsel").forEach(b=>b.classList.remove("sp","sn"));updBtn();
};
function updBtn(){ $("pConfBtn").textContent=pMode==="add"?`⭐ +${pAmt} نقطة`:`📉 −${pAmt} نقطة`; }
window.confirmPts=()=>{ const r=$("reasonInp").value||(pMode==="add"?"نقاط مضافة":"خصم نقاط"); applyPoints(pChild,pMode==="add"?pAmt:-pAmt,r); };
function closePanel(){ $("pointsPanel").classList.remove("open"); }
window.closePanel=closePanel;

  const mh=(S.history||[]).filter(h=>h.childId===cid).slice(0,40);
  $("dHist").innerHTML=mh.length?mh.map((h,i)=>`
    <div style="background:var(--card);border:2px solid ${h.points>0?isDark?"rgba(0,200,81,.3)":"#C8E6C9":isDark?"rgba(255,68,68,.3)":"#FFCDD2"};border-radius:14px;padding:11px 13px;margin-bottom:9px;display:flex;align-items:center;gap:11px;animation:fadeIn .22s ease ${i*.035}s both">
      <div style="width:40px;height:40px;border-radius:12px;background:${h.points>0?isDark?"rgba(0,200,81,.12)":"#E8F5E9":isDark?"rgba(255,68,68,.12)":"#FFEBEE"};border:2px solid ${h.points>0?isDark?"rgba(0,200,81,.3)":"#A5D6A7":isDark?"rgba(255,68,68,.3)":"#EF9A9A"};display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${h.points>0?"⬆️":"⬇️"}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.reason}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">${new Date(h.timestamp).toLocaleString("ar-SA")}</div>
      </div>
      <div style="background:${h.points>0?isDark?"rgba(0,200,81,.12)":"#E8F5E9":isDark?"rgba(255,68,68,.12)":"#FFEBEE"};border:2px solid ${h.points>0?isDark?"rgba(0,200,81,.3)":"#A5D6A7":isDark?"rgba(255,68,68,.3)":"#EF9A9A"};border-radius:11px;padding:3px 10px;font-weight:900;font-size:15px;color:${h.points>0?"#2E7D32":"#C62828"};flex-shrink:0">${h.points>0?"+":""}${h.points}</div>
    </div>`).join(""):`<div style="text-align:center;color:var(--text3);padding:44px;font-size:14px">لا توجد سجلات بعد 📭</div>`;
}

function closeDetail(){ $("detailView").style.display="none"; detId=null; }
window.closeDetail=closeDetail;

// ── EDIT CHILD
function buildEditUI(ti,em){
  const themes=isDark?TH_DARK:TH;
  $("tSel").innerHTML=themes.map((t,i)=>`<button onclick="selTh(${i})" id="ts_${i}" style="width:40px;height:40px;border-radius:50%;background:${t.card};border:3px solid ${i===ti?t.ac:t.br};cursor:pointer;font-size:17px;box-shadow:${i===ti?`0 0 0 3px ${t.ac}44`:"none"};transition:all .2s">${t.label}</button>`).join("");
  $("eSel").innerHTML=EMOJIS.map(e=>`<button onclick="selEm('${e}')" id="es_${e}" style="width:40px;height:40px;border-radius:10px;background:${e===em?(isDark?TH_DARK[ti].bg:TH[ti].bg):"var(--card2)"};border:2px solid ${e===em?(isDark?TH_DARK[ti].br:TH[ti].br):"var(--border)"};font-size:20px;cursor:pointer;transition:all .13s">${e}</button>`).join("");
}

window.selTh=(i)=>{
  $("eTi").value=i;
  const themes=isDark?TH_DARK:TH;
  themes.forEach((_,j)=>{ const b=$("ts_"+j); if(b){ b.style.borderColor=j===i?themes[j].ac:themes[j].br; b.style.boxShadow=j===i?`0 0 0 3px ${themes[j].ac}44`:"none"; } });
  $("eSaveBtn").style.background=`linear-gradient(135deg,${themes[i].br},${themes[i].ac})`;
  // update emoji selector colors
  const em=$("eEmoji").value;
  EMOJIS.forEach(e=>{ const b=$("es_"+e); if(b){ b.style.background=e===em?(isDark?TH_DARK[i].bg:TH[i].bg):"var(--card2)"; b.style.borderColor=e===em?(isDark?TH_DARK[i].br:TH[i].br):"var(--border)"; } });
};
window.selEm=(e)=>{
  $("eEmoji").value=e;
  const ti=+$("eTi").value;
  const themes=isDark?TH_DARK:TH;
  if(!$("ePhoto").value) $("ePrev").innerHTML=`<span style="font-size:42px">${e}</span>`;
  EMOJIS.forEach(em=>{ const b=$("es_"+em); if(b){ b.style.background=em===e?(isDark?TH_DARK[ti].bg:TH[ti].bg):"var(--card2)"; b.style.borderColor=em===e?themes[ti].br:"var(--border)"; } });
};
window.handlePhoto=(inp)=>{
  const f=inp.files[0]; if(!f)return;
  // Compress image before saving
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement("canvas");
      const MAX=300; let w=img.width,h=img.height;
      if(w>MAX||h>MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL("image/jpeg",0.7);
      $("ePhoto").value=compressed;
      $("ePrev").innerHTML=`<img src="${compressed}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(f);
};
window.clearPhoto=()=>{ $("ePhoto").value=""; $("ePrev").innerHTML=`<span style="font-size:42px">${$("eEmoji").value||"📷"}</span>`; };

function openNewChild(){ openEditChild(null); }
window.openNewChild=openNewChild;

function openEditChild(id){
  const c=id?S.children.find(x=>x.id===id):null;
  $("eId").value=id||"new";
  $("editTtl").textContent=c?"✏️ تعديل بيانات الطفل":"➕ إضافة طفل جديد";
  $("eName").value=c?.name||"";
  $("eAge").value=c?.age||8; $("ageV").textContent=c?.age||8;
  $("eGoal").value=c?.goal||200; $("goalV").textContent=c?.goal||200;
  const ti=c?.ti??S.children.length%TH.length;
  const em=c?.emoji||"🦁";
  $("eEmoji").value=em; $("eTi").value=ti;
  const ph=c?.photo||"";
  $("ePhoto").value=ph;
  $("ePrev").innerHTML=ph?`<img src="${ph}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:`<span style="font-size:42px">${em}</span>`;
  const themes=isDark?TH_DARK:TH;
  $("eSaveBtn").style.background=`linear-gradient(135deg,${themes[ti].br},${themes[ti].ac})`;
  buildEditUI(ti,em);
  $("editPanel").classList.add("open");
}
window.openEditChild=openEditChild;

window.saveChild=()=>{
  const id=$("eId").value;
  const name=$("eName").value||"طفل";
  const age=+$("eAge").value;
  const goal=+$("eGoal").value;
  const emoji=$("eEmoji").value||"⭐";
  const ti=+$("eTi").value;
  const photo=$("ePhoto").value||null;
  if(id==="new") S.children=[...S.children,{id:Date.now(),name,age,emoji,ti,points:0,goal,photo}];
  else S.children=S.children.map(c=>c.id==id?{...c,name,age,emoji,ti,goal,photo}:c);
  cloudSave(S); closeEdit(); renderPage(curTab); toast("✅ تم الحفظ والتزامن الفوري!");
};
function closeEdit(){ $("editPanel").classList.remove("open"); }
window.closeEdit=closeEdit;

// ── INIT
async function init(){
  // Load dark mode preference
  const savedDark=localStorage.getItem("ah_dark")==="1";
  if(savedDark){ isDark=true; document.getElementById("app").classList.add("dark"); $("darkBtn").textContent="☀️"; }

  // Check if data exists, if not save defaults
  try{
    const snap=await getDoc(REF);
    if(!snap.exists()){ await setDoc(REF,INIT); }
  }catch(e){}

  // Start real-time listener
  startListen();
}

init();
</script>
</body>
